[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = true
skip = [
    { name = "bitflags", version = "1" },
    { name = "hashbrown", version = "0.14" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "BSL-1.0",
    "Unicode-3.0",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
