[advisories]
yanked = "deny"
unmaintained = "workspace"
ignore = []

[bans]
multiple-versions = "deny"
wildcards = "deny"
allow-wildcard-paths = true

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
]
exceptions = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
